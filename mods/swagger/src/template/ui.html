<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{title}} - XyPriss API Docs</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #05070a;
                --surface: #0f1218;
                --surface-hover: #161b22;
                --primary: #6366f1;
                --primary-hover: #818cf8;
                --text: #f1f5f9;
                --text-muted: #94a3b8;
                --border: rgba(255, 255, 255, 0.06);

                --get: #10b981;
                --post: #3b82f6;
                --put: #f59e0b;
                --delete: #ef4444;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Outfit", sans-serif;
                background-color: var(--bg);
                color: var(--text);
                display: flex;
                min-height: 100vh;
            }

            aside {
                width: 320px;
                background-color: var(--surface);
                border-right: 1px solid var(--border);
                padding: 2.5rem 1.5rem;
                position: sticky;
                top: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }

            .logo {
                font-size: 1.25rem;
                font-weight: 700;
                margin-bottom: 2.5rem;
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .logo-box {
                width: 32px;
                height: 32px;
                background: linear-gradient(135deg, var(--primary), #a855f7);
                border-radius: 8px;
            }

            .nav-group-title {
                text-transform: uppercase;
                font-size: 0.7rem;
                font-weight: 700;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                margin-bottom: 1rem;
                margin-top: 2rem;
            }

            .nav-item {
                display: block;
                padding: 0.75rem 1rem;
                border-radius: 8px;
                color: var(--text-muted);
                text-decoration: none;
                font-size: 0.9rem;
                transition: all 0.2s;
                margin-bottom: 0.25rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .nav-item:hover {
                background: var(--surface-hover);
                color: var(--text);
            }

            .nav-item.active {
                background: rgba(99, 102, 241, 0.1);
                color: var(--primary);
                font-weight: 600;
            }

            main {
                flex: 1;
                padding: 4rem;
                max-width: 1100px;
                margin: 0 auto;
            }

            header {
                margin-bottom: 4rem;
            }

            h1 {
                font-size: 3rem;
                font-weight: 700;
                margin-bottom: 1rem;
                letter-spacing: -0.02em;
            }

            .description {
                font-size: 1.1rem;
                color: var(--text-muted);
                line-height: 1.7;
                max-width: 800px;
            }

            .endpoint-section {
                margin-bottom: 4rem;
                scroll-margin-top: 4rem;
            }

            .endpoint-header {
                display: flex;
                align-items: center;
                gap: 1.5rem;
                margin-bottom: 1.5rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid var(--border);
            }

            .method-badge {
                padding: 0.4rem 0.8rem;
                border-radius: 6px;
                font-size: 0.8rem;
                font-weight: 700;
                text-transform: uppercase;
                min-width: 70px;
                text-align: center;
            }

            .method-get {
                background: rgba(16, 185, 129, 0.1);
                color: var(--get);
                border: 1px solid rgba(16, 185, 129, 0.2);
            }
            .method-post {
                background: rgba(59, 130, 246, 0.1);
                color: var(--post);
                border: 1px solid rgba(59, 130, 246, 0.2);
            }
            .method-put {
                background: rgba(245, 158, 11, 0.1);
                color: var(--put);
                border: 1px solid rgba(245, 158, 11, 0.2);
            }
            .method-delete {
                background: rgba(239, 68, 68, 0.1);
                color: var(--delete);
                border: 1px solid rgba(239, 68, 68, 0.2);
            }

            .path {
                font-family: "Monaco", "Consolas", monospace;
                font-size: 1.1rem;
                font-weight: 600;
                color: var(--text);
            }

            .endpoint-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 2rem;
                margin-top: 1rem;
            }

            .summary {
                font-size: 1.25rem;
                font-weight: 600;
                margin-bottom: 1rem;
            }

            .detail-item {
                margin-top: 2rem;
            }

            .detail-label {
                font-size: 0.8rem;
                font-weight: 700;
                text-transform: uppercase;
                color: var(--text-muted);
                margin-bottom: 0.75rem;
                display: block;
            }

            .loader {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.5rem;
                height: 60vh;
            }

            .spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(99, 102, 241, 0.1);
                border-top-color: var(--primary);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            #error-view {
                display: none;
                background: rgba(239, 68, 68, 0.05);
                border: 1px solid rgba(239, 68, 68, 0.2);
                padding: 2rem;
                border-radius: 12px;
                color: #ef4444;
            }
        </style>
    </head>
    <body>
        <aside>
            <div class="logo">
                <div class="logo-box"></div>
                XyPriss Docs
            </div>
            <div class="nav-group-title">Endpoints</div>
            <nav id="sidebar-nav">
                <!-- Sidebar links generated dynamically -->
            </nav>
        </aside>

        <main>
            <div id="loading-view" class="loader">
                <div class="spinner"></div>
                <p style="color: var(--text-muted)">
                    Synchronizing with API Core...
                </p>
            </div>

            <div id="error-view">
                <h3>Failed to load API specification</h3>
                <p id="error-msg"></p>
            </div>

            <div id="docs-view" style="display: none">
                <header>
                    <h1 id="doc-title">{{title}}</h1>
                    <p class="description" id="doc-description"></p>
                </header>

                <div id="endpoints-container">
                    <!-- Endpoints generated dynamically -->
                </div>
            </div>
        </main>

        <script>
            const specUrl = "{{specUrl}}";
            const endpointsContainer = document.getElementById(
                "endpoints-container",
            );
            const sidebarNav = document.getElementById("sidebar-nav");
            const loadingView = document.getElementById("loading-view");
            const docsView = document.getElementById("docs-view");
            const errorView = document.getElementById("error-view");

            async function init() {
                try {
                    const response = await fetch(specUrl);
                    if (!response.ok)
                        throw new Error(`HTTP Error: ${response.status}`);
                    const spec = await response.json();
                    render(spec);
                } catch (err) {
                    loadingView.style.display = "none";
                    errorView.style.display = "block";
                    document.getElementById("error-msg").innerText =
                        err.message;
                }
            }

            function render(spec) {
                document.getElementById("doc-title").innerText =
                    spec.info.title || "API Documentation";
                document.getElementById("doc-description").innerText =
                    spec.info.description || "";

                const paths = spec.paths || {};
                for (const [path, methods] of Object.entries(paths)) {
                    for (const [method, details] of Object.entries(methods)) {
                        const id = `${method}-${path.replace(/\//g, "-")}`;

                        // Create Sidebar Link
                        const navItem = document.createElement("a");
                        navItem.href = `#${id}`;
                        navItem.className = "nav-item";
                        navItem.innerText = `${method.toUpperCase()} ${path}`;
                        sidebarNav.appendChild(navItem);

                        // Create Endpoint Section
                        const section = document.createElement("section");
                        section.className = "endpoint-section";
                        section.id = id;

                        section.innerHTML = `
                        <div class="endpoint-header">
                            <span class="method-badge method-${method}">${method}</span>
                            <span class="path">${path}</span>
                        </div>
                        <div class="endpoint-card">
                            <div class="summary">${details.summary || "No Summary"}</div>
                            <p style="color: var(--text-muted)">${details.description || "No description provided."}</p>
                            
                            ${
                                details.parameters && details.parameters.length
                                    ? `
                                <div class="detail-item">
                                    <span class="detail-label">Parameters</span>
                                    <ul style="list-style: none; color: var(--text-muted)">
                                        ${details.parameters.map((p) => `<li><code>${p.name}</code> (${p.in})</li>`).join("")}
                                    </ul>
                                </div>
                            `
                                    : ""
                            }

                            <div class="detail-item">
                                <span class="detail-label">Responses</span>
                                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                                    ${Object.entries(details.responses)
                                        .map(
                                            ([code, res]) => `
                                        <div style="background: rgba(255,255,255,0.03); padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border)">
                                            <span style="font-weight: 700; color: ${code.startsWith("2") ? "var(--get)" : "var(--delete)"}">${code}</span>
                                            <span style="font-size: 0.8rem; margin-left: 0.5rem">${res.description}</span>
                                        </div>
                                    `,
                                        )
                                        .join("")}
                                </div>
                            </div>
                        </div>
                    `;
                        endpointsContainer.appendChild(section);
                    }
                }

                loadingView.style.display = "none";
                docsView.style.display = "block";
            }

            init();
        </script>
    </body>
</html>
